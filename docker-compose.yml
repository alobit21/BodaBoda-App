version: '3.8'

services:
  # ---- Frontend UI (Next.js) ----
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: bodaboda-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    depends_on:
      - backend

  # ---- Backend API (Next.js) ----
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: bodaboda-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://default:CateX3QI2rJH@ep-snowy-bread-a49jrays-pooler.us-east-1.aws.neon.tech/BodaBodaApp?sslmode=require&channel_binding=require
      - JWT_SECRET=super123
    depends_on:
      - db

  # ---- Local Database (for dev) ----
  db:
    image: postgres:15-alpine
    container_name: bodaboda-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=bodaboda
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
